version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# TeleSight AI — Docker Compose Windows-compatible
# Tout en réseau bridge + ports explicites
# Les containers se parlent via le réseau Docker interne (telesight-net)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  telesight-net:
    driver: bridge

services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: telesight_zookeeper
    networks:
      - telesight-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: telesight_kafka
    networks:
      - telesight-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: telesight_postgres
    networks:
      - telesight-net
    environment:
      POSTGRES_DB: telesight
      POSTGRES_USER: telesight
      POSTGRES_PASSWORD: telesight123
    volumes:
      - ./partie1_pipeline/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telesight -d telesight"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: telesight_redis
    networks:
      - telesight-net
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Part 1 — Pipeline API (port 8000) ───────────────────────────────────────
  pipeline:
    build:
      context: ./partie1_pipeline
      dockerfile: Dockerfile
    container_name: telesight_pipeline
    networks:
      - telesight-net
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: host=postgres port=5432 dbname=telesight user=telesight password=telesight123
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: telecom_kpis
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Part 1 — Consumer ───────────────────────────────────────────────────────
  consumer:
    build:
      context: ./partie1_pipeline
      dockerfile: Dockerfile.consumer
    container_name: telesight_consumer
    networks:
      - telesight-net
    environment:
      DATABASE_URL: host=postgres port=5432 dbname=telesight user=telesight password=telesight123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: telecom_kpis
    depends_on:
      pipeline:
        condition: service_healthy

  # ── Part 1 — Producer ───────────────────────────────────────────────────────
  producer:
    build:
      context: ./partie1_pipeline
      dockerfile: Dockerfile.producer
    container_name: telesight_producer
    networks:
      - telesight-net
    volumes:
      - ./data/unified_kpi_with_anomalies.csv:/data/unified_kpi_with_anomalies.csv:ro
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: telecom_kpis
      SEND_INTERVAL: "0.1"
    depends_on:
      consumer:
        condition: service_started

  # ── Part 2 — ML API (port 8001) ─────────────────────────────────────────────
  ml:
    build:
      context: ./partie2_ml
      dockerfile: Dockerfile
    container_name: telesight_ml
    networks:
      - telesight-net
    ports:
      - "8001:8001"
    environment:
      P1_URL: http://pipeline:8000
    depends_on:
      pipeline:
        condition: service_healthy

  # ── Part 3 — RAG API (port 8002) ────────────────────────────────────────────
  rag:
    build:
      context: ./partie3_rag
      dockerfile: Dockerfile
    container_name: telesight_rag
    networks:
      - telesight-net
    ports:
      - "8002:8002"
    environment:
      P1_URL: http://pipeline:8000
      P2_URL: http://ml:8001
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - ./partie3_rag/.env
    depends_on:
      pipeline:
        condition: service_healthy

  # ── Part 4 — Dashboard React (port 3000) ────────────────────────────────────
  dashboard:
    build:
      context: ./partie4_dashboard
      dockerfile: Dockerfile
    container_name: telesight_dashboard
    networks:
      - telesight-net
    ports:
      - "3000:3000"
    depends_on:
      - pipeline
      - ml
      - rag

volumes:
  postgres_data: